name: Build & Package LEDE 24.10.5 for OneCloud

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: 24.10.5

jobs:
  # ==========================================
  # JOB 1: COMPILE THE FIRMWARE
  # ==========================================
  compile:
    name: Compile Firmware
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Compilation Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y ack antlr3 aria2 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
        git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
        libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
        libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 \
        python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo \
        uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo apt-get clean

    - name: Clone LEDE Source
      run: |
        git clone -b $REPO_BRANCH --single-branch $REPO_URL lede

    - name: Update and Install Feeds
      working-directory: ./lede
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure Network Settings (Static IP & Gateway)
      working-directory: ./lede
      run: |
        # Injects your specific network settings directly into the firmware's first-boot script
        mkdir -p package/base-files/files/etc/uci-defaults
        cat << 'EOF' > package/base-files/files/etc/uci-defaults/99-custom-network
        #!/bin/sh
        uci set network.lan.ipaddr='192.168.1.44'
        uci set network.lan.gateway='192.168.1.1'
        uci set network.lan.dns='192.168.1.1'
        uci set dhcp.lan.ignore='1'
        uci set luci.main.lang='zh_cn'
        uci commit network
        uci commit dhcp
        uci commit luci
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/99-custom-network

    - name: Load Custom Configuration
      run: |
        # Pulls your uploaded .config from the repository root into the LEDE builder
        if [ -f "$GITHUB_WORKSPACE/.config" ]; then
          cp $GITHUB_WORKSPACE/.config $GITHUB_WORKSPACE/lede/.config
          echo "Custom .config loaded successfully."
        else
          echo "Error: No .config file found in the root of your repository!"
          exit 1
        fi
        
        # Expands the configuration to resolve any hidden background dependencies
        cd $GITHUB_WORKSPACE/lede
        make defconfig

    - name: Download Packages
      working-directory: ./lede
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      working-directory: ./lede
      run: |
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Prepare Raw Firmware for Transfer
      run: |
        mkdir -p raw_images
        # Bulletproof wildcard search for the compiled image
        find $GITHUB_WORKSPACE/lede/bin/targets/ -type f -name "*.img.gz" -exec cp {} raw_images/ \;
        if [ -z "$(ls -A raw_images/)" ]; then
          echo "Error: No .img.gz files found! Compilation failed to output the target."
          exit 1
        fi

    - name: Upload Raw Firmware Artifact (Hidden Transfer)
      uses: actions/upload-artifact@v4
      with:
        name: Raw-Compiled-Image
        path: raw_images/*.img.gz
        retention-days: 1

  # ==========================================
  # JOB 2: PACKAGE AND BURN 4GB IMAGE
  # ==========================================
  package:
    name: Package 4GB Burn Image
    needs: compile  # This tells GitHub to WAIT for Job 1 to finish successfully
    runs-on: ubuntu-22.04

    steps:
    - name: Install Packaging Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y android-sdk-libsparse-utils e2fsprogs xz-utils

    - name: Download Raw Firmware from Job 1
      uses: actions/download-artifact@v4
      with:
        name: Raw-Compiled-Image
        path: downloaded_images

    - name: Setup Packaging Environment
      run: |
        # Clone xydche's repository for the packaging tools
        git clone https://github.com/xydche/onecloud-openwrt.git
        cd onecloud-openwrt
        sudo rm -rf dependson README.md diy-part*
        
        # Create lede directory and move downloaded images into it
        mkdir -p lede
        cp ../downloaded_images/*.img.gz lede/

    - name: Execute 4GB Burn Script
      working-directory: ./onecloud-openwrt
      run: |
        cat << 'EOF' > gen_burn_img.sh
        #!/bin/bash
        ./AmlImg unpack ./uboot.img burn/
        gzip -dk lede/*.gz

        diskimg_path="lede/*.img"
        boot_img_name="openwrt.img"
        boot_img_mnt="xd"
        rootfs_img_mnt="img"
        prefix=$(ls $diskimg_path | sed 's/\.img$//')
        burnimg_name="${prefix}.burn.img"

        diskimg=$(ls -1 $diskimg_path | head -n 1)
        loop=$(sudo losetup --find --show --partscan "$diskimg" | sed 's/[^[:print:]]//g')

        if [ -z "$loop" ]; then
          echo "Error: Failed to setup loop device."
          exit 1
        fi

        # User's 4GB allocation constraint
        dd if=/dev/zero of="${boot_img_name}" bs=1M count=4096 status=progress
        if [ $? -ne 0 ]; then
          echo "Error: Failed to create boot image."
          exit 1
        fi

        /sbin/mkfs.ext4 "${boot_img_name}"
        if [ $? -ne 0 ]; then
          echo "Error: Failed to format boot image."
          exit 1
        fi

        mkdir -p "${boot_img_mnt}" "${rootfs_img_mnt}"
        sudo mount "${boot_img_name}" "${boot_img_mnt}"
        if [ $? -ne 0 ]; then
          echo "Error: Failed to mount boot image."
          exit 1
        fi

        sudo mount "${loop}p2" "${rootfs_img_mnt}"
        if [ $? -ne 0 ]; then
          echo "Error: Failed to mount rootfs partition."
          exit 1
        fi

        sudo cp -rp ${rootfs_img_mnt}/* "${boot_img_mnt}"
        sudo sync

        sudo umount "${boot_img_mnt}" || true
        sudo umount "${rootfs_img_mnt}" || true
        rm -rf "${boot_img_mnt}" "${rootfs_img_mnt}"

        sudo img2simg "${loop}p1" burn/boot.simg
        sudo img2simg "${boot_img_name}" burn/rootfs.simg
        sudo rm -f "${boot_img_name}"

        sudo losetup -d "$loop" || true

        printf "PARTITION:boot:sparse:boot.simg\nPARTITION:rootfs:sparse:rootfs.simg\n" >> burn/commands.txt

        ./AmlImg pack "${burnimg_name}" burn/
        sha256sum "${burnimg_name}" > "${burnimg_name}.sha"
        xz -9 --threads=0 --compress "${burnimg_name}"
        rm -rf burn
        rm ${diskimg_path}
        echo "Script execution completed."
        EOF

        # Fixed: AmlImg now has its proper 'g'!
        sudo chmod +x gen_burn_img.sh AmlImg
        sudo ./gen_burn_img.sh

    - name: Upload Final Burn Image
      uses: actions/upload-artifact@v4
      with:
        name: LEDE-OneCloud-4GB-Final
        path: ${{ github.workspace }}/onecloud-openwrt/*.burn.img.*
