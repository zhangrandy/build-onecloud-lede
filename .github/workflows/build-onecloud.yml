name: Build Lean LEDE for Thunder OneCloud

on:
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions tab

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Compilation Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y ack antlr3 aria2 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
        git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
        libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
        libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 \
        python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo \
        uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev \
        android-sdk-libsparse-utils
        sudo apt-get clean

    - name: Clone Lean LEDE Source
      run: |
        git clone -b $REPO_BRANCH --single-branch $REPO_URL lede
        
    - name: Update and Install Feeds
      working-directory: ./lede
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure Network Settings (IP, Gateway, DNS, Disable DHCP)
      working-directory: ./lede
      run: |
        mkdir -p package/base-files/files/etc/uci-defaults
        cat << 'EOF' > package/base-files/files/etc/uci-defaults/99-custom-network
        #!/bin/sh
        # Set Static IP and Gateway
        uci set network.lan.ipaddr='192.168.1.44'
        uci set network.lan.gateway='192.168.1.1'
        # Set DNS
        uci set network.lan.dns='192.168.1.1'
        # Disable DHCP Server on LAN
        uci set dhcp.lan.ignore='1'
        # Save and Apply
        uci commit network
        uci commit dhcp
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/99-custom-network

    - name: Generate Configuration
      working-directory: ./lede
      run: |
        # 1. Set the OneCloud Target
        echo "CONFIG_TARGET_amlogic=y" >> .config
        echo "CONFIG_TARGET_amlogic_meson8b=y" >> .config
        echo "CONFIG_TARGET_amlogic_meson8b_DEVICE_thunder-onecloud=y" >> .config
        echo "CONFIG_LINUX_6_1=y" >> .config

        # 2. Storage Modifications
        echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
        echo "CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=256" >> .config
        echo "CONFIG_TARGET_EXT4_BLOCKSIZE=4096" >> .config

        # 3. Additions
        echo "CONFIG_PACKAGE_firewall4=y" >> .config
        echo "CONFIG_PACKAGE_cpufreq=y" >> .config
        echo "CONFIG_PACKAGE_nano-full=y" >> .config
        echo "CONFIG_PACKAGE_blkid=y" >> .config
        echo "CONFIG_PACKAGE_curl=y" >> .config
        echo "CONFIG_PACKAGE_wget-ssl=y" >> .config
        echo "CONFIG_PACKAGE_openssh-sftp-server=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-diskman=y" >> .config

        # 4. Removals
        echo "# CONFIG_PACKAGE_luci-app-accesscontrol is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-arpbind is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-autoreboot is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-ddns is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-filetransfer is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-nlbwmon is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-rclone_INCLUDE_rclone-webui is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-turboacc is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-upnp is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-vlmcsd is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-vsftpd is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-app-wol is not set" >> .config

        # 5. Keepalived & Passwall Kernel Modules
        echo "CONFIG_PACKAGE_keepalived=y" >> .config
        echo "CONFIG_PACKAGE_kmod-nf-ipvs=y" >> .config
        echo "CONFIG_PACKAGE_kmod-nf-conntrack-netlink=y" >> .config
        echo "CONFIG_PACKAGE_kmod-nf-socket=y" >> .config
        echo "CONFIG_PACKAGE_kmod-nft-socket=y" >> .config
        echo "CONFIG_PACKAGE_kmod-nft-tproxy=y" >> .config

        make defconfig

    - name: Download Packages
      working-directory: ./lede
      run: |
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      working-directory: ./lede
      run: |
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: OneCloud Post-Processing (Generate Burnable Image)
      run: |
        cd $GITHUB_WORKSPACE
        
        # Clone the repo just to get AmlImg and uboot.img
        git clone https://github.com/xydche/onecloud-openwrt.git
        cd onecloud-openwrt
        
        sudo rm -rf dependson README.md diy-part*
        
        mkdir -p lede
        cp $GITHUB_WORKSPACE/lede/bin/targets/amlogic/meson8b/*.img.gz lede/
        
        # Inject the user's custom generation script
        cat << 'EOF' > gen_burn_img.sh
        #!/bin/bash
        ./AmlImg unpack ./uboot.img burn/
        gzip -dk lede/*.gz

        diskimg_path="lede/*.img"
        boot_img_name="openwrt.img"
        boot_img_mnt="xd"
        rootfs_img_mnt="img"
        prefix=$(ls $diskimg_path | sed 's/\.img$//')
        burnimg_name="${prefix}.burn.img"

        diskimg=$(ls -1 $diskimg_path | head -n 1)
        loop=$(sudo losetup --find --show --partscan "$diskimg" | sed 's/[^[:print:]]//g')

        if [ -z "$loop" ]; then
          echo "Error: Failed to setup loop device."
          exit 1
        fi

        dd if=/dev/zero of="${boot_img_name}" bs=1M count=4096 status=progress
        if [ $? -ne 0 ]; then
          echo "Error: Failed to create boot image."
          exit 1
        fi

        /sbin/mkfs.ext4 "${boot_img_name}"
        if [ $? -ne 0 ]; then
          echo "Error: Failed to format boot image."
          exit 1
        fi

        mkdir -p "${boot_img_mnt}" "${rootfs_img_mnt}"
        sudo mount "${boot_img_name}" "${boot_img_mnt}"
        if [ $? -ne 0 ]; then
          echo "Error: Failed to mount boot image."
          exit 1
        fi

        sudo mount "${loop}p2" "${rootfs_img_mnt}"
        if [ $? -ne 0 ]; then
          echo "Error: Failed to mount rootfs partition."
          exit 1
        fi

        sudo cp -rp ${rootfs_img_mnt}/* "${boot_img_mnt}"
        sudo sync

        sudo umount "${boot_img_mnt}" || true
        sudo umount "${rootfs_img_mnt}" || true
        rm -rf "${boot_img_mnt}" "${rootfs_img_mnt}"

        sudo img2simg "${loop}p1" burn/boot.simg
        sudo img2simg "${boot_img_name}" burn/rootfs.simg
        sudo rm -f "${boot_img_name}"

        sudo losetup -d "$loop" || true

        printf "PARTITION:boot:sparse:boot.simg\nPARTITION:rootfs:sparse:rootfs.simg\n" >> burn/commands.txt

        ./AmlImg pack "${burnimg_name}" burn/
        sha256sum "${burnimg_name}" > "${burnimg_name}.sha"
        xz -9 --threads=0 --compress "${burnimg_name}"
        rm -rf burn
        rm ${diskimg_path}
        echo "Script execution completed."
        EOF

        sudo chmod +x gen_burn_img.sh AmlIm
        sudo ./gen_burn_img.sh

    - name: Upload Final Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OneCloud-OpenWrt-Firmware
        path: ${{ github.workspace }}/onecloud-openwrt/lede/*.burn.img.*
